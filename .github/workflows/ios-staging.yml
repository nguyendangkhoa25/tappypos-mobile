name: iOS — Build & Submit to TestFlight (Staging)

on:
  push:
    branches:
      - staging
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  build-and-submit:
    name: EAS Build + Submit (staging)
    runs-on: ubuntu-latest # EAS builds in Expo cloud — no macOS runner needed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (staging)
        run: eas build --platform ios --profile staging --non-interactive

      - name: Submit to TestFlight (staging)
        run: eas submit --platform ios --latest --non-interactive
