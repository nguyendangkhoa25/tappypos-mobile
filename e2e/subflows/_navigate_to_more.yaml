# Reusable subflow: navigate to the More tab (Khác) and wait for it to settle.
# Precondition: user is already logged in and on any main tab.
# Result: MoreScreen is visible.
appId: com.knp.tappypos
---

- tapOn:
    id: "tab-more"
# Assert a tile that is always present (text "Khác" is inside a non-accessible Pressable)
- assertVisible:
    id: "more-config-products"
