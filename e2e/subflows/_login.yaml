# Reusable subflow: launch → logout if needed → Shop ID → Login → skip PIN → main app
#
# Required env vars (pass with --env or --env-file):
#   SHOP_ID   - tenant slug (e.g. "my-shop")
#   PHONE     - login phone / username
#   PASSWORD  - login password
#
# Result: user lands on the "Tổng quan" (Dashboard) tab.
appId: com.knp.tappypos
---

# clearState: false — preserves AsyncStorage so the Expo dev menu does NOT appear.
# clearKeychain: true — clears SecureStore (JWT tokens) so the app returns to login.
# Auth tokens live in Keychain; clearing them forces re-login without losing Metro URL.
- launchApp:
    clearState: false
    clearKeychain: true

# ── 0a. Dev server picker (appears if AsyncStorage was cleared externally) ────
# Tap port 8082 (dev Metro) to connect. The Expo dev launcher UI is native (not RN)
# so text matching doesn't work — use coordinate tap for the second server row (~53% height).
- runFlow:
    when:
      visible:
        text: "DEVELOPMENT SERVERS"
    commands:
      - tapOn:
          point: "50%, 37%"

# ── 0b. PIN screen "change store" link ───────────────────────────────────────
- tapOn:
    text: "Đổi cửa hàng"
    optional: true

# ── 1. Shop ID screen (only shown on fresh install; skipped if already stored) ─
- runFlow:
    when:
      visible:
        id: "shop-id-input"
    commands:
      - tapOn:
          id: "shop-id-input"
      - inputText: ${SHOP_ID}
      - tapOn:
          id: "shop-id-submit"

# ── 2. Login screen — ensure Vietnamese locale ───────────────────────────────
# Use testID instead of text to be locale-independent (app may render in VI or EN).
# Always tap VI to ensure flows that assert Vietnamese text work correctly.
- assertVisible:
    id: "login-phone"
- tapOn:
    id: "lang-btn-vi"
    optional: true
- tapOn:
    id: "login-phone"
- inputText: ${PHONE}
- tapOn:
    id: "login-password"
- inputText: ${PASSWORD}
- assertVisible:
    id: "login-submit"
    enabled: true
- pressKey: Enter

# ── 3. PIN setup — skip if it appears ────────────────────────────────────────
- tapOn:
    text: "Bỏ qua, thiết lập sau"
    optional: true

# ── 4. Main app is ready ─────────────────────────────────────────────────────
# Use testID on the tab bar button (always present) instead of the label text which
# is rendered inside a custom Pressable and may not be in Maestro's accessibility tree.
- assertVisible:
    id: "tab-more"
