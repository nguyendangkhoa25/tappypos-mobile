appId: com.knp.tappypos
---

# ⚠️  THIS SUBFLOW IS DEPRECATED — DO NOT USE IN NEW FLOWS ⚠️
#
# Maestro evalScript uses GraalVM JS (js-language-24.2.0.jar). The GraalJsHttp
# class exposes:
#
#   post(String url, Map<String, Object> options)
#
# GraalVM cannot automatically coerce a plain JS object literal `{}` to
# Java's `Map<String, Object>` without an explicit `targetTypeMapping` in the
# HostAccess configuration — and Maestro's GraalJsEngine does not configure this.
# As a result, `http.post(url, { body: '...', headers: {...} })` silently fails
# (the exception is swallowed by Maestro) and makes zero TCP connections.
#
# Confirmed by: `netcat -l 6868` receiving 0 bytes while evalScript "runs" in 0ms.
#
# REPLACEMENT: Use curl in a shell pre-seed script (run_all.sh) before running
# flow 03. See:
#   e2e/shops/hair_salon/run_all.sh   (seed_pending_orders function)
#   e2e/shops/spa_shop/run_all.sh
#   e2e/shops/makeup_studio/run_all.sh
#
# The correct 2-arg API format (for reference — still broken at GraalVM level):
#
#   http.post(BASE + '/auth/login/force', {
#     body: JSON.stringify({ username: PHONE, password: PASSWORD, rememberMe: false }),
#     headers: { 'Content-Type': 'application/json', 'X-Tenant-ID': SHOP_ID }
#   });
#
# Two-step evalScript pattern explained (kept for documentation):
# The Maestro bug where ${VAR} + any } in the same script causes
# "Missing close quote" requires splitting into two evalScript steps:
#   Step 1: output.xxx = "${VAR}"   (no {} object literals here)
#   Step 2: var x = output.xxx      (no ${VAR} substitutions here, use output.xxx)

# Step 1: capture env vars into output (no {} in this script)
- evalScript: |
    output.phone = "${PHONE}";
    output.password = "${PASSWORD}";
    output.shopId = "${SHOP_ID}";

# Step 2: attempt force-login and seed — WILL NOT WORK due to GraalVM type coercion
# Left here only to document the intended logic; use run_all.sh instead.
- evalScript: |
    var BASE = 'http://localhost:6868/api';
    var PHONE = output.phone;
    var PASSWORD = output.password;
    var SHOP_ID = output.shopId;

    // NOTE: http.post(url, optionsMap) silently fails under GraalVM.
    // GraalJsHttp.post(String, Map<String,Object>) cannot accept a plain JS
    // object as the second arg — GraalVM type coercion is not configured.
    // Zero bytes reach the server; no error is thrown; Maestro reports COMPLETED.
    var loginResp = http.post(
      BASE + '/auth/login/force',
      {
        body: JSON.stringify({ username: PHONE, password: PASSWORD, rememberMe: false }),
        headers: {
          'Content-Type': 'application/json',
          'X-Tenant-ID': SHOP_ID
        }
      }
    );
