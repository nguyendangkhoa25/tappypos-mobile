appId: com.knp.tappypos
name: "HAIR 16 Customer loyalty — points balance visible in customer detail (LOYALTY feature)"
---

# ── Setup: log in ────────────────────────────────────────────────────────────
- runFlow: ../../../subflows/_login.yaml

# ── Navigate to Customer list via More (Danh mục section, always expanded) ────
- runFlow: ../../../subflows/_navigate_to_more.yaml
- tapOn:
    id: "more-config-customers"
- assertVisible: "Khách hàng"

# ── LY01: Open first customer ─────────────────────────────────────────────────
- tapOn:
    id: "customer-row-0"
- assertVisible:
    text: "Điểm tích lũy"
    optional: true

# ── LY02: Navigate to loyalty history ────────────────────────────────────────
- tapOn:
    text: "Xem lịch sử"
    optional: true
- assertVisible:
    id: "loyalty-balance"
    optional: true
- assertNotVisible: "500"

# ── Navigate back to home ─────────────────────────────────────────────────────
- tapOn:
    id: "tab-home"
