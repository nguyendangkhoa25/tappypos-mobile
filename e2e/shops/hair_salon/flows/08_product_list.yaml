appId: com.knp.tappypos
name: "HAIR 08 Product list — search hair services, verify blocked inventory (PRODUCT feature)"
---

# ── Setup: log in ────────────────────────────────────────────────────────────
- runFlow: ../../../subflows/_login.yaml

# ── Navigate to Products via More ────────────────────────────────────────────
# Products is in the "Danh mục" (catalog) section — starts expanded.
- runFlow: ../../../subflows/_navigate_to_more.yaml
- tapOn:
    id: "more-config-products"
- assertVisible: "Sản phẩm"
- assertNotVisible: "500"

# ── PL01: Search for a hair service ───────────────────────────────────────────
- tapOn:
    id: "product-search-input"
- inputText: "cắt tóc"
# Tap screen title to dismiss keyboard instead of hideKeyboard (returnKeyType=search
# prevents the standard keyboard dismiss gesture that Maestro uses).
- tapOn: "Sản phẩm"
- assertNotVisible: "500"

# ── PL02: Clear search ────────────────────────────────────────────────────────
- tapOn:
    id: "product-search-input"
- eraseText: 50
- tapOn: "Sản phẩm"

# ── PL03: First product card is accessible ────────────────────────────────────
- tapOn:
    id: "product-card-.*"
    optional: true
- assertNotVisible: "500"
# Navigate back if we went into a product detail
- tapOn:
    text: "‹"
    optional: true

# ── PL04: INVENTORY tile is NOT present in More (hair salon has no inventory) ─
- runFlow: ../../../subflows/_navigate_to_more.yaml
- assertNotVisible:
    id: "more-config-inventory"

# ── Navigate back to home ─────────────────────────────────────────────────────
- tapOn:
    id: "tab-home"
