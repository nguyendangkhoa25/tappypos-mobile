appId: com.knp.tappypos
name: "BARM 13 Order history — list, filter by status, open detail (ORDER + ORDER_VIEW_ALL)"
---

- runFlow: ../../../subflows/_login.yaml

# Navigate to orders via barber sell screen → orders tab
- tapOn:
    id: "tab-sell"
- assertVisible: "Tạo đơn mới"
- tapOn:
    id: "barber-orders-tab"
- assertNotVisible: "500"
- assertNotVisible: "INTERNAL_SERVER_ERROR"

- tapOn:
    id: "order-row-0"
    optional: true
- assertNotVisible: "500"
- tapOn:
    id: "order-detail-back-btn"
    optional: true

- tapOn:
    id: "order-filter-COMPLETED"
    optional: true
- assertNotVisible: "500"

- tapOn:
    id: "order-filter-CANCELLED"
    optional: true
- assertNotVisible: "500"

- tapOn:
    id: "order-filter-ALL"
    optional: true

- tapOn:
    id: "tab-home"
- assertVisible: "Doanh thu"
