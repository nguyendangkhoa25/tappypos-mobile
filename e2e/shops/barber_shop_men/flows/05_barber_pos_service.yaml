appId: com.knp.tappypos
name: "05 Barber POS — pick service → add to order → checkout → success"
---

# ── Setup: log in ────────────────────────────────────────────────────────────
- runFlow: ../../../subflows/_login.yaml

# ── Navigate to Sell tab (BarberServiceScreen) ───────────────────────────────
- tapOn:
    id: "tab-sell"
- assertVisible: "Tạo đơn mới"

# ── B01: First service card is visible ───────────────────────────────────────
# barber-service-<name> — tap the first one rendered (regex match)
- tapOn:
    id: "barber-service-.*"

# ── B02: AddItemSheet appears — confirm "Thêm vào đơn" ──────────────────────
- assertVisible: "Thêm vào đơn"
- tapOn:
    id: "barber-add-to-order"

# ── B03: CartBar appears with count 1 ────────────────────────────────────────
- assertVisible:
    id: "barber-cart-count"
- assertVisible: "1"

# ── B04: Add a second service ────────────────────────────────────────────────
- tapOn:
    id: "barber-service-.*"
- assertVisible: "Thêm vào đơn"
- tapOn:
    id: "barber-add-to-order"
- assertVisible: "2"

# ── B05: Open CheckoutSheet ──────────────────────────────────────────────────
- tapOn:
    id: "barber-checkout-btn"
- assertVisible: "Xem giỏ hàng"

# ── B06: Default payment is Cash — assert via testID (text inside Modal ScrollView
#        may not be in Maestro's visible accessibility tree)
- assertVisible:
    id: "checkout-payment-cash"

# ── B07: Place order ─────────────────────────────────────────────────────────
- tapOn:
    id: "barber-place-order-btn"

# ── B07b: Dismiss rebook modal (shown after pay-now success when customer may/may not be set)
- tapOn:
    id: "barber-rebook-skip"
    optional: true

# ── B08: Order success screen ────────────────────────────────────────────────
- assertVisible: "Đặt hàng thành công!"
- assertVisible:
    id: "order-success-number"

# ── B09: Start a new order ───────────────────────────────────────────────────
- tapOn:
    id: "order-success-new"
- assertVisible: "Tạo đơn mới"
