appId: com.knp.tappypos
name: "SPA 13 Security — blocked features absent, service features present"
---

# ── Setup: log in ────────────────────────────────────────────────────────────
- runFlow: ../../../subflows/_login.yaml

# ── Navigate to More ──────────────────────────────────────────────────────────
- runFlow: ../../../subflows/_navigate_to_more.yaml

# ── SEC01: INVENTORY tile is NOT visible (spa has no inventory) ───────────────
- assertNotVisible:
    id: "more-tile-inventory"

# ── SEC02: Gold price tile is NOT visible (spa has no gold price) ─────────────
- assertNotVisible:
    id: "more-tile-goldPrice"

# ── SEC03: APPOINTMENT tile IS visible (spa has appointments) ─────────────────
- assertVisible:
    id: "more-tile-appointments"

# ── SEC04: Sell tab shows spa service screen (not product POS) ────────────────
- tapOn:
    id: "tab-sell"
- assertVisible: "Dịch vụ"
- assertNotVisible: "Tìm sản phẩm..."

# ── SEC05: Vendor tile is NOT visible (spa has no vendor) ────────────────────
- runFlow: ../../../subflows/_navigate_to_more.yaml
- assertNotVisible: "Nhà cung cấp"

# ── Navigate back to home ─────────────────────────────────────────────────────
- tapOn:
    id: "tab-home"
- assertVisible: "Tổng quan"
