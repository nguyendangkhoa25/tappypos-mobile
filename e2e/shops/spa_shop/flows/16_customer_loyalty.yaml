appId: com.knp.tappypos
name: "SPA 16 Customer loyalty — points balance visible in customer detail (LOYALTY feature)"
---

# ── Setup: log in ────────────────────────────────────────────────────────────
- runFlow: ../../../subflows/_login.yaml

# ── Navigate to Customer list ─────────────────────────────────────────────────
- tapOn:
    id: "tab-home"
- assertVisible: "Tổng quan"
- tapOn:
    id: "dashboard-customers-btn"
- assertVisible: "Khách hàng"

# ── LY01: Open first customer ─────────────────────────────────────────────────
- tapOn:
    id: "customer-row-0"
- assertVisible: "Điểm tích lũy"
    optional: true

# ── LY02: Navigate to loyalty history ────────────────────────────────────────
- tapOn: "Xem lịch sử"
    optional: true
- assertVisible:
    id: "loyalty-balance"
    optional: true
- assertNotVisible: "500"

# ── Navigate back to home ─────────────────────────────────────────────────────
- tapOn:
    id: "tab-home"
- assertVisible: "Tổng quan"
