appId: com.knp.tappypos
name: "SPA 15 Appointment check-in → POS — core spa workflow (APPOINTMENT + POS)"
---

# This flow tests the core spa workflow:
# Book appointment → check in → spa POS opens → place order → success
#
# ── Setup: log in ────────────────────────────────────────────────────────────
- runFlow: ../../../subflows/_login.yaml

# ── Step 1: Create a fresh appointment ────────────────────────────────────────
- runFlow: ../../../subflows/_navigate_to_more.yaml
- tapOn:
    id: "more-tile-appointments"
- assertVisible: "Lịch hẹn"

- tapOn:
    id: "appointment-add-fab"
- assertVisible: "Đặt lịch hẹn"

- tapOn:
    id: "appt-customer-name"
- inputText: "Khách Spa Check-In"

- tapOn:
    id: "appt-customer-phone"
- inputText: "0911777888"

- tapOn:
    id: "appt-save-btn"
- assertVisible: "Lịch hẹn"

# ── Step 2: Open the appointment and check in ─────────────────────────────────
- tapOn:
    id: "appointment-card-0"
- assertVisible: "Khách Spa Check-In"
- assertVisible:
    id: "appt-checkin-btn"

- tapOn:
    id: "appt-checkin-btn"

# ── CI03: Success alert — tap action to open POS ─────────────────────────────
- assertVisible: "Check-in thành công"
    optional: true
- tapOn: "Xem đơn"
    optional: true
- tapOn: "Mở đơn hàng"
    optional: true
- tapOn: "OK"
    optional: true

# ── CI04: Spa service screen is open ─────────────────────────────────────────
- tapOn:
    id: "tab-sell"
- assertVisible: "Dịch vụ"

# ── CI05: Add a spa service and place order ───────────────────────────────────
- tapOn:
    id: "barber-service-.*"
- assertVisible: "Thêm vào đơn"
- tapOn:
    id: "barber-add-to-order"

- tapOn:
    id: "barber-checkout-btn"
- assertVisible: "Hoàn tất đơn hàng"

- tapOn:
    id: "barber-place-order-btn"
- assertVisible: "Đặt hàng thành công!"
- assertVisible:
    id: "order-success-number"

# ── CI06: Start new order ─────────────────────────────────────────────────────
- tapOn:
    id: "order-success-new"
- assertVisible: "Dịch vụ"

# ── CI07: Verify appointment no longer shows check-in button ─────────────────
- runFlow: ../../../subflows/_navigate_to_more.yaml
- tapOn:
    id: "more-tile-appointments"
- assertVisible: "Lịch hẹn"
- tapOn:
    id: "appointment-card-0"
    optional: true
- assertNotVisible:
    id: "appt-checkin-btn"

# ── Navigate back to home ─────────────────────────────────────────────────────
- tapOn:
    id: "tab-home"
- assertVisible: "Tổng quan"
