appId: com.knp.tappypos
name: "MKUP 14 Order history — list, filter, detail (ORDER + ORDER_VIEW_ALL)"
---

- runFlow: ../../../subflows/_login.yaml

- tapOn:
    id: "tab-home"
- assertVisible: "Tổng quan"
- tapOn:
    id: "dashboard-orders-btn"
    optional: true

- assertNotVisible: "500"
- assertNotVisible: "INTERNAL_SERVER_ERROR"

- tapOn:
    id: "order-row-0"
    optional: true
- assertNotVisible: "500"
- tapOn:
    id: "order-detail-back-btn"
    optional: true

- tapOn:
    id: "order-filter-COMPLETED"
    optional: true
- assertNotVisible: "500"

- tapOn:
    id: "order-filter-CANCELLED"
    optional: true
- assertNotVisible: "500"

- tapOn:
    id: "order-filter-ALL"
    optional: true

- tapOn:
    id: "tab-home"
- assertVisible: "Tổng quan"
