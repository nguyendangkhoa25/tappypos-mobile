appId: com.knp.tappypos
name: "MKUP 10 Notifications — list renders, filter chips (NOTIFICATION feature)"
---

- runFlow: ../../../subflows/_login.yaml

- runFlow: ../../../subflows/_navigate_to_more.yaml
- tapOn:
    id: "more-tile-notifications"
- assertVisible: "Thông báo"
- assertNotVisible: "500"
- assertNotVisible: "INTERNAL_SERVER_ERROR"

- tapOn:
    id: "notification-row-0"
    optional: true
- assertNotVisible: "500"
- tapOn:
    text: "‹"
    optional: true

- assertVisible: "Tất cả"
    optional: true

- tapOn:
    id: "tab-home"
- assertVisible: "Tổng quan"
