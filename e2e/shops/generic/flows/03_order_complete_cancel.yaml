appId: com.knp.tappypos
name: "03 Order detail — complete and cancel actions"
---

# ── Setup: log in ─────────────────────────────────────────────────────────────
- runFlow: ../../../subflows/_login.yaml

# ── Seed two PENDING orders via the app UI ────────────────────────────────────
# Order 1: add a product and tap "Lưu đơn" (save order → PENDING)
- tapOn:
    id: "tab-selling"
- assertVisible: "Tìm sản phẩm..."
- tapOn:
    id: "pos-product-${PRODUCT_NAME}"
- tapOn:
    id: "pos-cart-btn"
- assertVisible: "Giỏ hàng"
- tapOn:
    id: "cart-save-order-btn"
- assertVisible: "Tìm sản phẩm..."

# Order 2: add the same product again and save
- tapOn:
    id: "pos-product-${PRODUCT_NAME}"
- tapOn:
    id: "pos-cart-btn"
- assertVisible: "Giỏ hàng"
- tapOn:
    id: "cart-save-order-btn"
- assertVisible: "Tìm sản phẩm..."

# ── Navigate to OrderList via the order history button ─────────────────────────
- tapOn:
    id: "pos-order-list-btn"
- assertVisible: "Đơn hàng"

# ── Filter list to PENDING only ───────────────────────────────────────────────
- tapOn:
    id: "order-filter-PENDING"
# Wait for the list to reload with at least one PENDING order row visible
- assertVisible:
    id: "order-row-0"

# ── P26: Tap the first PENDING order ─────────────────────────────────────────
- tapOn:
    id: "order-row-0"

# ── P27: Order detail renders with action buttons ─────────────────────────────
- assertVisible: "Chi tiết đơn hàng"
- assertVisible:
    id: "order-complete-btn"
- assertVisible:
    id: "order-cancel-btn"

# ── P29: Cancel the order ─────────────────────────────────────────────────────
- tapOn:
    id: "order-cancel-btn"
- assertVisible: "Hủy đơn hàng?"
- tapOn: "Hủy đơn"
# After cancel: status chip shows "Đã hủy"; action footer is gone
- assertVisible: "Đã hủy"
- assertNotVisible: "Hoàn thành"

# ── Return to OrderList (PENDING filter still active) ─────────────────────────
- tapOn:
    id: "order-detail-back-btn"
# Wait for list to refresh; second order is still PENDING
- assertVisible:
    id: "order-row-0"

# ── P28: Tap the remaining PENDING order ──────────────────────────────────────
- tapOn:
    id: "order-row-0"
- assertVisible: "Chi tiết đơn hàng"
- assertVisible:
    id: "order-complete-btn"

# ── P28: Complete the order ───────────────────────────────────────────────────
- tapOn:
    id: "order-complete-btn"
# After complete: status chip shows "Hoàn thành"; cancel button is gone
- assertVisible: "Hoàn thành"
- assertNotVisible: "Hủy đơn"
